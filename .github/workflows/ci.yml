name: Code Quality

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm lint
        env:
          SKIP_ENV_VALIDATION: true

      - name: Run Type Check
        run: pnpm typecheck
        env:
          SKIP_ENV_VALIDATION: true

      - name: Run Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: true